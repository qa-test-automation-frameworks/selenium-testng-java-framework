<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Allure failure artifacts preview</title>
  <desc id="desc">Stylized preview of an Allure failure report page with screenshots, console logs, page source, and redacted diagnostic attachments.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="0" y="0" width="1280" height="72" fill="#111827"/>
  <text x="32" y="46" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Allure Report — Failure Artifacts Preview</text>
  <rect x="32" y="104" width="1216" height="96" rx="18" fill="#ffffff" stroke="#d7deea"/>
  <text x="64" y="146" fill="#991b1b" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">verifyCheckoutRequiresLastName</text>
  <text x="64" y="180" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">Failed assertion with screenshot, page source, console logs, network logs, capabilities, and redacted attachments.</text>
  <rect x="1088" y="132" width="120" height="36" rx="18" fill="#fee2e2"/>
  <text x="1125" y="156" fill="#b91c1c" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">failed</text>
  <rect x="32" y="232" width="580" height="424" rx="18" fill="#ffffff" stroke="#d7deea"/>
  <text x="56" y="272" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Failure Screenshot</text>
  <rect x="56" y="296" width="532" height="336" rx="14" fill="#e2e8f0"/>
  <rect x="78" y="322" width="488" height="38" rx="10" fill="#ffffff"/>
  <text x="98" y="347" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18">https://www.saucedemo.com/checkout-step-one.html</text>
  <rect x="96" y="392" width="212" height="160" rx="14" fill="#cbd5e1"/>
  <rect x="336" y="392" width="192" height="46" rx="10" fill="#ffffff"/>
  <rect x="336" y="454" width="192" height="46" rx="10" fill="#fecaca"/>
  <text x="352" y="484" fill="#991b1b" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Error: Last Name is required</text>
  <rect x="644" y="232" width="604" height="200" rx="18" fill="#ffffff" stroke="#d7deea"/>
  <text x="668" y="272" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Attached Diagnostics</text>
  <rect x="668" y="296" width="548" height="46" rx="12" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="688" y="325" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="17">Screenshot.png</text>
  <text x="1096" y="325" fill="#10b981" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">image</text>
  <rect x="668" y="354" width="548" height="46" rx="12" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="688" y="383" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="17">Page source (redacted).html</text>
  <text x="1060" y="383" fill="#6366f1" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">html</text>
  <rect x="644" y="456" width="604" height="200" rx="18" fill="#0f172a" stroke="#1e293b"/>
  <text x="668" y="496" fill="#ffffff" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700">Console / Network Logs</text>
  <text x="668" y="536" fill="#93c5fd" font-family="Consolas, 'Courier New', monospace" font-size="16">INFO  Request POST /checkout-step-two</text>
  <text x="668" y="568" fill="#fca5a5" font-family="Consolas, 'Courier New', monospace" font-size="16">WARN  validation-error lastName=&lt;redacted&gt;</text>
  <text x="668" y="600" fill="#86efac" font-family="Consolas, 'Courier New', monospace" font-size="16">INFO  capabilities browserName=chrome headless=true</text>
  <text x="668" y="632" fill="#f9a8d4" font-family="Consolas, 'Courier New', monospace" font-size="16">INFO  videoUrl=https://grid.example/videos/&lt;session-id&gt;.mp4</text>
</svg>

