<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="980" viewBox="0 0 1420 980" role="img" aria-labelledby="title desc">
  <title id="title">Selenium TestNG Java Framework Login Flow Slice</title>
  <desc id="desc">An architectural dependency diagram showing files, classes, methods, and relationships of the LoginPage and LoginTests in the Selenium TestNG Java framework.</desc>
  <defs>
    <marker id="arrow-call" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-struct" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-type" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .canvas { fill: url(#bg); }
      .title { font: 700 28px 'Segoe UI', Inter, sans-serif; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font: 500 15px 'Segoe UI', Inter, sans-serif; fill: #475569; }
      .small { font: 500 12px 'Segoe UI', Inter, sans-serif; fill: #64748b; }
      .label { font: 600 14px 'Segoe UI', Inter, sans-serif; fill: #1e293b; }
      .path { font: 11px Consolas, monospace; fill: #64748b; }
      .kind { font: 700 10px 'Segoe UI', Inter, sans-serif; letter-spacing: 1.5px; fill: #64748b; }
      .metric { font: 700 18px 'Segoe UI', Inter, sans-serif; fill: #0f172a; }
      .metric-label { font: 12px 'Segoe UI', Inter, sans-serif; fill: #64748b; }
      
      /* Modern, vibrant node styles */
      .file rect { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.5; rx: 8px; ry: 8px; }
      .class rect { fill: #f0f9ff; stroke: #0ea5e9; stroke-width: 1.5; rx: 8px; ry: 8px; }
      
      /* Dynamic green pulse for runnable methods */
      @keyframes method-pulse {
        0%, 100% { filter: drop-shadow(0 4px 6px rgba(34, 197, 94, 0.06)); }
        50% { filter: drop-shadow(0 4px 12px rgba(34, 197, 94, 0.22)); }
      }
      .method rect { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.5; rx: 8px; ry: 8px; animation: method-pulse 3s ease-in-out infinite; }
      
      .interface rect { fill: #faf5ff; stroke: #a855f7; stroke-width: 1.5; rx: 8px; ry: 8px; }
      .pattern-box rect { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 12px; ry: 12px; }
      
      .legend-box { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
      
      /* Active call execution flow animation */
      @keyframes call-flow {
        from { stroke-dashoffset: 24; }
        to { stroke-dashoffset: 0; }
      }
      .edge-call { fill: none; stroke: #0284c7; stroke-width: 2.6; marker-end: url(#arrow-call); stroke-dasharray: 6 6; animation: call-flow 1.5s linear infinite; }
      
      .edge-struct { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow-struct); stroke-dasharray: 6 5; }
      .edge-type { fill: none; stroke: #7c3aed; stroke-width: 2.5; marker-end: url(#arrow-type); }
      .edge-label { font: 700 11px 'Segoe UI', Inter, sans-serif; fill: #334155; paint-order: stroke; stroke: #f8fafc; stroke-width: 4px; }
      .group-title { font: 700 13px 'Segoe UI', Inter, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="canvas" width="1420" height="980"/>
  <rect x="28" y="26" width="1364" height="928" rx="18" fill="#ffffff" opacity="0.75" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="58" y="74" class="title">Selenium TestNG Java Framework: Login Flow OOP Structure</text>
  <text x="58" y="103" class="subtitle">A structural graph of classes, methods, and relationships representing the end-to-end login flow and its dependencies.</text>

  <!-- Framework Design Principles Card (Replaces CodeGraph SQLite DB) -->
  <g class="pattern-box" filter="url(#shadow)">
    <rect x="1060" y="50" width="278" height="134" />
    <text x="1082" y="80" class="kind">DESIGN PATTERNS</text>
    <text x="1082" y="105" class="label">OOP Separation of Concerns</text>
    <text x="1082" y="125" class="small">• Page Object &amp; Component Model</text>
    <text x="1082" y="141" class="small">• Method-level ThreadLocal isolation</text>
    <text x="1082" y="157" class="small">• Explicit waits only (no implicit waits)</text>
  </g>

  <!-- Legend 1 -->
  <g transform="translate(58 134)">
    <rect class="legend-box" width="360" height="78" rx="8"/>
    <text x="18" y="27" class="group-title">Connector Meanings</text>
    <line x1="18" y1="49" x2="78" y2="49" class="edge-call"/>
    <text x="88" y="53" class="small">calls / instantiates (active flow)</text>
    <line x1="206" y1="49" x2="266" y2="49" class="edge-struct"/>
    <text x="276" y="53" class="small">contains (structural)</text>
  </g>

  <!-- Legend 2 -->
  <g transform="translate(442 134)">
    <rect class="legend-box" width="395" height="78" rx="8"/>
    <rect x="18" y="19" width="38" height="22" rx="5" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="66" y="35" class="small">file node</text>
    <rect x="148" y="19" width="38" height="22" rx="5" fill="#f0f9ff" stroke="#0ea5e9"/>
    <text x="196" y="35" class="small">class node</text>
    <rect x="278" y="19" width="38" height="22" rx="5" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="326" y="35" class="small">method node</text>
    <line x1="18" y1="58" x2="78" y2="58" class="edge-type"/>
    <text x="88" y="62" class="small">extends / implements</text>
  </g>

  <!-- Edges, drawn behind nodes -->
  <!-- 1. LoginTests.java (File) contains LoginTests (Class) -->
  <path d="M 178 300 L 178 350" class="edge-struct"/>
  <text x="192" y="331" class="edge-label">contains</text>

  <!-- 2. LoginTests (Class) contains verifyStandardUserCanLogin() (Method) -->
  <path d="M 178 426 L 178 520" class="edge-struct"/>
  <text x="192" y="479" class="edge-label">contains</text>

  <!-- 3. LoginTests (Class) extends BaseTestCase (Class) -->
  <path d="M 298 388 L 338 388" class="edge-type"/>
  <text x="304" y="374" class="edge-label">extends</text>

  <!-- 4. verifyStandardUserCanLogin() (Method) calls Pages.login() (Method) -->
  <path d="M 298 562 L 338 558" class="edge-call"/>
  <text x="306" y="544" class="edge-label">calls</text>

  <!-- 5. Pages.login() (Method) instantiates LoginPage (Class) -->
  <path d="M 578 558 C 600 558, 600 420, 618 388" class="edge-call"/>
  <text x="582" y="495" class="edge-label">instantiates</text>

  <!-- 6. verifyStandardUserCanLogin() (Method) calls login(LoginRequest) (Method) -->
  <path d="M 298 562 C 450 630, 450 630, 618 558" class="edge-call"/>
  <text x="440" y="605" class="edge-label">pages().login()</text>

  <!-- 7. LoginPage.java (File) contains LoginPage (Class) -->
  <path d="M 738 300 L 738 350" class="edge-struct"/>
  <text x="752" y="331" class="edge-label">contains</text>

  <!-- 8. LoginPage (Class) contains login(LoginRequest) (Method) -->
  <path d="M 738 426 L 738 520" class="edge-struct"/>
  <text x="752" y="479" class="edge-label">contains</text>

  <!-- 9. LoginPage (Class) contains open / enterUsername (Methods) -->
  <path d="M 738 596 L 738 660" class="edge-struct"/>
  <text x="752" y="634" class="edge-label">contains</text>

  <!-- 10. LoginPage (Class) extends BasePage (Abstract Class) -->
  <path d="M 858 388 C 878 388, 878 268, 898 268" class="edge-type"/>
  <text x="868" y="335" class="edge-label">extends</text>

  <!-- 11. LoginPage (Class) implements PageLoadable (Interface) -->
  <path d="M 858 388 L 898 388" class="edge-type"/>
  <text x="868" y="402" class="edge-label">implements</text>

  <!-- 12. open / enterUsername (Methods) calls open(url) (Method) -->
  <path d="M 858 698 C 878 698, 878 668, 898 668" class="edge-call"/>
  <text x="868" y="688" class="edge-label">calls</text>

  <!-- 13. login(LoginRequest) (Method) calls waitUntilLoaded() (Method) -->
  <path d="M 858 558 C 878 558, 878 528, 898 528" class="edge-call"/>
  <text x="868" y="549" class="edge-label">calls</text>

  <!-- 14. login(LoginRequest) (Method) returns InventoryPage (Class) -->
  <path d="M 738 596 L 738 800" class="edge-call"/>
  <text x="752" y="704" class="edge-label">returns</text>

  <!-- 15. BasePage (Abstract Class) calls WebDriverFactory.getThreadLocalWaitUtils() -->
  <path d="M 1018 306 C 1018 388, 1150 388, 1178 388" class="edge-call"/>
  <text x="1090" y="374" class="edge-label">calls</text>

  <!-- 16. waitUntilLoaded() (Method) calls waitUtils.waitUntilVisible() -->
  <path d="M 1138 528 L 1178 528" class="edge-call"/>
  <text x="1146" y="514" class="edge-label">calls</text>

  <!-- Left Column: Test Layer -->
  <g class="file" filter="url(#shadow)">
    <rect x="58" y="230" width="240" height="70"/>
    <text x="76" y="255" class="kind">FILE</text>
    <text x="76" y="278" class="label">LoginTests.java</text>
    <text x="76" y="294" class="path">src/test/java/.../tests</text>
  </g>

  <g class="class" filter="url(#shadow)">
    <rect x="58" y="350" width="240" height="76"/>
    <text x="76" y="376" class="kind">CLASS</text>
    <text x="76" y="400" class="label">LoginTests</text>
    <text x="76" y="418" class="path">extends BaseTestCase</text>
  </g>

  <g class="method" filter="url(#shadow)">
    <rect x="58" y="520" width="240" height="84"/>
    <text x="76" y="546" class="kind">METHOD</text>
    <text x="76" y="570" class="label">verifyStandardUserCanLogin()</text>
    <text x="76" y="588" class="path">uses pages().login().login(...)</text>
  </g>

  <!-- Middle Column: Base Test & Lifecycle -->
  <g class="class" filter="url(#shadow)">
    <rect x="338" y="350" width="240" height="76"/>
    <text x="356" y="376" class="kind">CLASS</text>
    <text x="356" y="400" class="label">BaseTestCase</text>
    <text x="356" y="418" class="path">test setup, driver lifecycle, Pages</text>
  </g>

  <g class="method" filter="url(#shadow)">
    <rect x="338" y="520" width="240" height="76"/>
    <text x="356" y="546" class="kind">METHOD</text>
    <text x="356" y="570" class="label">Pages.login()</text>
    <text x="356" y="588" class="path">return new LoginPage(driver)</text>
  </g>

  <!-- Column 3: Page Objects (Implementation) -->
  <g class="file" filter="url(#shadow)">
    <rect x="618" y="230" width="240" height="70"/>
    <text x="636" y="255" class="kind">FILE</text>
    <text x="636" y="278" class="label">LoginPage.java</text>
    <text x="636" y="294" class="path">src/main/java/.../page</text>
  </g>

  <g class="class" filter="url(#shadow)">
    <rect x="618" y="350" width="240" height="76"/>
    <text x="636" y="376" class="kind">CLASS</text>
    <text x="636" y="400" class="label">LoginPage</text>
    <text x="636" y="418" class="path">page object for login form</text>
  </g>

  <g class="method" filter="url(#shadow)">
    <rect x="618" y="520" width="240" height="76"/>
    <text x="636" y="546" class="kind">METHOD</text>
    <text x="636" y="570" class="label">login(LoginRequest)</text>
    <text x="636" y="588" class="path">orchestrates the happy path</text>
  </g>

  <g class="method" filter="url(#shadow)">
    <rect x="618" y="660" width="240" height="76"/>
    <text x="636" y="686" class="kind">METHODS</text>
    <text x="636" y="710" class="label">open / enterUsername</text>
    <text x="636" y="728" class="path">enterPassword / loginExpectingSuccess</text>
  </g>

  <g class="class" filter="url(#shadow)">
    <rect x="618" y="800" width="240" height="76"/>
    <text x="636" y="826" class="kind">CLASS</text>
    <text x="636" y="850" class="label">InventoryPage</text>
    <text x="636" y="868" class="path">successful login landing page</text>
  </g>

  <!-- Column 4: Framework Base Class & Utilities -->
  <g class="class" filter="url(#shadow)">
    <rect x="898" y="230" width="240" height="76"/>
    <text x="916" y="256" class="kind">ABSTRACT CLASS</text>
    <text x="916" y="280" class="label">BasePage</text>
    <text x="916" y="298" class="path">navigateTo(), wait utilities</text>
  </g>

  <g class="interface" filter="url(#shadow)">
    <rect x="898" y="350" width="240" height="76"/>
    <text x="916" y="376" class="kind">INTERFACE</text>
    <text x="916" y="400" class="label">PageLoadable&lt;LoginPage&gt;</text>
    <text x="916" y="418" class="path">waitUntilLoaded contract</text>
  </g>

  <g class="method" filter="url(#shadow)">
    <rect x="898" y="490" width="240" height="76"/>
    <text x="916" y="516" class="kind">METHOD</text>
    <text x="916" y="540" class="label">waitUntilLoaded()</text>
    <text x="916" y="558" class="path">waits on login button</text>
  </g>

  <g class="method" filter="url(#shadow)">
    <rect x="898" y="630" width="240" height="76"/>
    <text x="916" y="656" class="kind">METHOD</text>
    <text x="916" y="680" class="label">open(url)</text>
    <text x="916" y="698" class="path">navigate + wait</text>
  </g>

  <!-- Column 5: Driver & Wait Abstractions -->
  <g class="method" filter="url(#shadow)">
    <rect x="1178" y="350" width="184" height="76"/>
    <text x="1196" y="376" class="kind">METHOD</text>
    <text x="1196" y="400" class="label">getThreadLocalWaitUtils()</text>
    <text x="1196" y="418" class="path">WebDriverFactory helper</text>
  </g>

  <g class="method" filter="url(#shadow)">
    <rect x="1178" y="490" width="184" height="76"/>
    <text x="1196" y="516" class="kind">METHOD</text>
    <text x="1196" y="540" class="label">waitUntilVisible()</text>
    <text x="1196" y="558" class="path">Selenium wait helper</text>
  </g>

  <!-- Architectural Note (Replaces CodeGraph Bottom Disclaimer) -->
  <g transform="translate(58 920)">
    <text class="small">This architectural graph represents a structural slice of the framework's login flow. Test classes (specs) utilize typed page objects which extend a base class, enforce strict interface contracts, and call thread-isolated utility instances to ensure highly stable, parallel-safe execution.</text>
  </g>
</svg>
