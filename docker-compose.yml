services:
  selenium-hub:
    image: selenium/hub:4.43.0@sha256:c572aee0db3fd9bcc23f129c764ca07e652dd9c252c41e116307c732d42e5210
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 5s
      retries: 5

  chrome:
    image: selenium/node-chrome:4.43.0@sha256:9e60c032f8f0950bb962868e73263fb503cb6fbf3f14fdd31e81c1f14b6f247b
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  firefox:
    image: selenium/node-firefox:4.43.0@sha256:16a61877cfa7da429504c443c5584645638e2050f2a575a88c14c477d1c4bdea
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  edge:
    image: selenium/node-edge:4.43.0@sha256:61a61df6ce223f5f9f09acb21c9fbdab289a73d21bdd7c42eedf9e97a4e2c8bf
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    profiles:
      - edge

  test-runner:
    build: .
    depends_on:
      selenium-hub:
        condition: service_healthy
    volumes:
      # Mount target directory to extract allure-results and other artifacts back to the host/Jenkins workspace
      - ./target:/app/target
    environment:
      - REMOTE_URL=http://selenium-hub:4444/wd/hub
      - BROWSER=${BROWSER:-CHROME}
      - EXECUTION_TYPE=remote
      - ENV=${ENV:-qa}
      - APP_USERNAME=${APP_USERNAME:-standard_user}
      - APP_PASSWORD=${APP_PASSWORD:-}
      - GROUPS=${GROUPS:-}
      - THREAD_COUNT=${THREAD_COUNT:-2}
      - RETRY_ENABLED=${RETRY_ENABLED:-false}
      - HEADLESS=${HEADLESS:-true}
      - ALLOW_PASSWORDLESS_SKIPS=${ALLOW_PASSWORDLESS_SKIPS:-false}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until curl -sf http://selenium-hub:4444/status | grep -q '"ready":true';
        do echo "Waiting for Selenium Grid to become ready..."; sleep 2; done;
        ./mvnw verify -Dheadless=$${HEADLESS} -Dbrowser=$${BROWSER} -Dexecution.type=remote -Dremote.url=$${REMOTE_URL}
        -Dthread.count=$${THREAD_COUNT} -Dretry.enabled=$${RETRY_ENABLED} -Dallow.passwordless.skips=$${ALLOW_PASSWORDLESS_SKIPS}
        $${GROUPS:+-Dgroups=$${GROUPS}}
