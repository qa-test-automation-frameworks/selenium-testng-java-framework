services:
  selenium-hub:
    image: selenium/hub:4.43.0
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 5s
      retries: 5

  chrome:
    image: selenium/node-chrome:4.43.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  firefox:
    image: selenium/node-firefox:4.43.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  edge:
    image: selenium/node-edge:4.43.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    profiles:
      - edge

  test-runner:
    build: .
    depends_on:
      selenium-hub:
        condition: service_healthy
    volumes:
      # Mount target directory to extract allure-results and other artifacts back to the host/Jenkins workspace
      - ./target:/app/target
    environment:
      - REMOTE_URL=http://selenium-hub:4444/wd/hub
      - BROWSER=${BROWSER:-CHROME}
      - EXECUTION_TYPE=remote
      - ENV=${ENV:-qa}
      - APP_USERNAME=${APP_USERNAME:-standard_user}
      - APP_PASSWORD=${APP_PASSWORD:?APP_PASSWORD is required}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until curl -sf http://selenium-hub:4444/status | grep -q '"ready":true';
        do echo "Waiting for Selenium Grid to become ready..."; sleep 2; done;
        ./mvnw verify -Dheadless=true -Dbrowser=$${BROWSER} -Dexecution.type=remote -Dremote.url=$${REMOTE_URL}
