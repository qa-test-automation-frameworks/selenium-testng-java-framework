version: '3.8'

services:
  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 5s
      retries: 5

  chrome:
    image: selenium/node-chrome:4.21.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  firefox:
    image: selenium/node-firefox:4.21.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  test-runner:
    build: .
    container_name: test-runner
    depends_on:
      selenium-hub:
        condition: service_healthy
      chrome:
        condition: service_started
    volumes:
      # Mount target directory to extract allure-results and other artifacts back to the host/Jenkins workspace
      - ./target:/app/target
    environment:
      - REMOTE_URL=http://selenium-hub:4444/wd/hub
      - driverType=${BROWSER:-CHROME}
      - execution_type=remote
      - env=${ENV:-qa}
    # Override the Dockerfile entrypoint to run against the grid
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Grid to be fully ready..."
        sleep 5
        mvn verify -DREMOTE_URL=http://selenium-hub:4444/wd/hub -DdriverType=$$driverType
