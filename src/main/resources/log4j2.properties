status = warn
name = Log4j2Config

# Appender configuration
appender.console.type = Console
appender.console.name = STDOUT
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
# %highlight adds colors based on log level
# %d{HH:mm:ss.SSS} adds timestamp
# (%t) thread name, %c{1} simplified class name, %M method name, %L line number
appender.console.layout.pattern = %highlight{%d{HH:mm:ss.SSS} (%t) %c{1}.%M:%L - %m%n}{FATAL=red, ERROR=red, WARN=yellow, INFO=green, DEBUG=cyan, TRACE=black}

# Root logger configuration
rootLogger.level = info
rootLogger.appenderRef.stdout.ref = STDOUT
