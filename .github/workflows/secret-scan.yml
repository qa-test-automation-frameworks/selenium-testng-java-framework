name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Scan for high-confidence secret patterns
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys
          patterns = [
              re.compile(r'AKIA[0-9A-Z]{16}'),
              re.compile(r'-----BEGIN (?:RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'),
              re.compile(r'ghp_[A-Za-z0-9_]{20,}'),
              re.compile(r'xox[baprs]-[A-Za-z0-9-]{20,}'),
              re.compile(r'(?i)\b(secret_sauce)\b'),
          ]
          app_password_assignment = re.compile(r'(?i)\bAPP_PASSWORD\s*=\s*(?P<value>.*)$')
          ignored_parts = {'.git', 'target', '.idea'}
          failures = []
          def has_hardcoded_app_password(line):
              match = app_password_assignment.search(line)
              if not match:
                  return False
              value = match.group('value').split('#', 1)[0].strip()
              if not value or value in {'""', "''"} or value.startswith('${APP_PASSWORD:-}'):
                  return False
              return not re.match(r'^["\']?<[^>\r\n]+>["\']?', value)

          for path in Path.cwd().rglob('*'):
              if not path.is_file() or ignored_parts.intersection(path.parts):
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              for line_number, line in enumerate(text.splitlines(), start=1):
                  if path.name == 'secret-scan.yml' and 'secret_sauce' in line:
                      continue
                  if any(pattern.search(line) for pattern in patterns) or has_hardcoded_app_password(line):
                      failures.append(f'{path}:{line_number}: potential secret pattern')
          if failures:
              print('\n'.join(failures))
              sys.exit(1)
          PY
