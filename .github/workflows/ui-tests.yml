name: UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1-5'

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run formatting and static-analysis gates
        run: ./mvnw -DskipTests validate spotless:check checkstyle:check

  test:
    needs: quality-gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [CHROME, FIREFOX]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Show browser versions
        run: |
          google-chrome --version || true
          firefox --version || true

      - name: Validate required secrets for trusted full regression
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: test -n "$APP_PASSWORD"
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

      - name: Run public smoke tests
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          TEST_STATUS=0
          ./mvnw clean test -Dgroups=inventory,cart -Dbrowser=${{ matrix.browser }} -Dheadless=true -Dthread.count=2 || TEST_STATUS=$?
          ./mvnw allure:report -DskipTests
          exit $TEST_STATUS

      - name: Run full UI regression
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          TEST_STATUS=0
          ./mvnw clean test -Dbrowser=${{ matrix.browser }} -Dheadless=true -Dthread.count=2 || TEST_STATUS=$?
          ./mvnw allure:report -DskipTests
          exit $TEST_STATUS
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/

      - name: Upload generated Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}
          path: target/allure-report/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.browser }}
          path: target/surefire-reports/

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs-${{ matrix.browser }}
          path: target/logs/

      - name: Publish job summary
        if: always()
        run: |
          {
            echo "## UI test job summary"
            echo
            echo "- Browser matrix entry: ${{ matrix.browser }}"
            echo "- Event: ${{ github.event_name }}"
            echo "- Run mode: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'public no-secret smoke' || 'trusted full regression' }}"
            echo "- Allure results artifact: allure-results-${{ matrix.browser }}"
            echo "- Allure report artifact: allure-report-${{ matrix.browser }}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-allure-report:
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: target/allure-results
          merge-multiple: true

      - name: Generate Allure report
        run: ./mvnw allure:report -DskipTests

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
