name: UI Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      run_accessibility:
        description: 'Run the optional accessibility smoke suite'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 6 * * 1-5'

concurrency:
  group: ui-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5

  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Validate Maven wrapper distribution
        run: grep -Fxq 'distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.15/apache-maven-3.9.15-bin.zip' .mvn/wrapper/maven-wrapper.properties

      - name: Run formatting and static-analysis gates
        run: ./mvnw -DskipTests validate spotless:check checkstyle:check pmd:check spotbugs:check

  dependency-governance:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Validate Maven wrapper distribution
        run: grep -Fxq 'distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.15/apache-maven-3.9.15-bin.zip' .mvn/wrapper/maven-wrapper.properties

      - name: Generate dependency update report
        run: |
          mkdir -p target/dependency-governance
          ./mvnw versions:display-dependency-updates -Dmaven.version.rules=file://$PWD/config/versions/rules.xml > target/dependency-governance/dependency-updates.txt
          ./mvnw versions:display-plugin-updates -Dmaven.version.rules=file://$PWD/config/versions/rules.xml > target/dependency-governance/plugin-updates.txt

      - name: Upload dependency update reports
        uses: actions/upload-artifact@v7
        with:
          name: dependency-update-reports
          path: target/dependency-governance/*.txt

      - name: Generate SBOM
        run: ./mvnw -Psbom -DskipTests verify

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: cyclonedx-sbom
          path: target/*bom*.*

  test:
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        browser: [CHROME, FIREFOX, EDGE]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Validate Maven wrapper distribution
        run: grep -Fxq 'distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.15/apache-maven-3.9.15-bin.zip' .mvn/wrapper/maven-wrapper.properties

      - name: Start Selenium Grid
        shell: bash
        run: |
          set -euo pipefail
          browser_service="$(echo "${{ matrix.browser }}" | tr '[:upper:]' '[:lower:]')"

          if [[ "$browser_service" == "edge" ]]; then
            docker compose --profile edge up -d selenium-hub edge
          else
            docker compose up -d selenium-hub "$browser_service"
          fi

          deadline=$((SECONDS + 120))
          until curl -sf http://localhost:4444/status | grep -Eq '"ready"[[:space:]]*:[[:space:]]*true'; do
            if (( SECONDS >= deadline )); then
              curl -sf http://localhost:4444/status || true
              docker compose ps
              docker compose logs --no-color selenium-hub "$browser_service"
              exit 1
            fi
            sleep 2
          done

      - name: Validate required secrets for trusted full regression
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: test -n "$APP_PASSWORD"
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

      - name: Run public smoke tests
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        env:
          APP_USERNAME: standard_user
        run: |
          TEST_STATUS=0
          ./mvnw clean test -Dgroups=inventory,cart -Dbrowser=${{ matrix.browser }} -Dheadless=true -Dthread.count=2 -Dexecution.type=remote -Dremote.url=http://localhost:4444/wd/hub -Dallure.issue.pattern=https://github.com/${{ github.repository }}/issues/{} || TEST_STATUS=$?
          ./mvnw allure:report -DskipTests -Dallure.issue.pattern=https://github.com/${{ github.repository }}/issues/{}
          exit $TEST_STATUS

      - name: Run full UI regression
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          TEST_STATUS=0
          ./mvnw clean test -Dbrowser=${{ matrix.browser }} -Dheadless=true -Dthread.count=2 -Dexecution.type=remote -Dremote.url=http://localhost:4444/wd/hub -Dallure.issue.pattern=https://github.com/${{ github.repository }}/issues/{} || TEST_STATUS=$?
          ./mvnw allure:report -DskipTests -Dallure.issue.pattern=https://github.com/${{ github.repository }}/issues/{}
          exit $TEST_STATUS
        env:
          APP_USERNAME: standard_user
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/

      - name: Upload generated Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-${{ matrix.browser }}
          path: target/allure-report/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-${{ matrix.browser }}
          path: target/surefire-reports/

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: execution-logs-${{ matrix.browser }}
          path: target/logs/

      - name: Tear down Selenium Grid
        if: always()
        run: docker compose down --remove-orphans

      - name: Publish job summary
        if: always()
        run: |
          {
            echo "## UI test job summary"
            echo
            echo "- Browser matrix entry: ${{ matrix.browser }}"
            echo "- Event: ${{ github.event_name }}"
            echo "- Run mode: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'public no-secret smoke' || 'trusted full regression' }}"
            echo "- Allure results artifact: allure-results-${{ matrix.browser }}"
            echo "- Allure report artifact: allure-report-${{ matrix.browser }}"
          } >> "$GITHUB_STEP_SUMMARY"

  accessibility:
    needs: quality-gates
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_accessibility == true)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Validate Maven wrapper distribution
        run: grep -Fxq 'distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.15/apache-maven-3.9.15-bin.zip' .mvn/wrapper/maven-wrapper.properties

      - name: Start Selenium Grid
        run: |
          docker compose up -d selenium-hub chrome
          deadline=$((SECONDS + 120))
          until curl -sf http://localhost:4444/status | grep -Eq '"ready"[[:space:]]*:[[:space:]]*true'; do
            if (( SECONDS >= deadline )); then
              curl -sf http://localhost:4444/status || true
              docker compose ps
              docker compose logs --no-color selenium-hub chrome
              exit 1
            fi
            sleep 2
          done

      - name: Run accessibility smoke suite
        run: |
          TEST_STATUS=0
          ./mvnw clean test -Dtestng.suite.file=testng-accessibility.xml -Dgroups=accessibility -Dbrowser=CHROME -Dheadless=true -Dthread.count=1 -Dexecution.type=remote -Dremote.url=http://localhost:4444/wd/hub -Dallure.issue.pattern=https://github.com/${{ github.repository }}/issues/{} || TEST_STATUS=$?
          ./mvnw allure:report -DskipTests -Dallure.issue.pattern=https://github.com/${{ github.repository }}/issues/{}
          exit $TEST_STATUS

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-accessibility
          path: target/allure-results/

      - name: Upload generated Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-accessibility
          path: target/allure-report/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-accessibility
          path: target/surefire-reports/

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: execution-logs-accessibility
          path: target/logs/

      - name: Tear down Selenium Grid
        if: always()
        run: docker compose down --remove-orphans

      - name: Publish accessibility job summary
        if: always()
        run: |
          {
            echo "## Accessibility smoke summary"
            echo
            echo "- Event: ${{ github.event_name }}"
            echo "- Browser: CHROME"
            echo "- Suite file: testng-accessibility.xml"
            echo "- Allure results artifact: allure-results-accessibility"
            echo "- Allure report artifact: allure-report-accessibility"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-allure-report:
    needs: [test, accessibility]
    # Publish even on failed tests so the latest failure diagnostics remain inspectable.
    if: always() && github.ref == 'refs/heads/main' && (needs.test.result != 'skipped' || needs.accessibility.result != 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Validate Maven wrapper distribution
        run: grep -Fxq 'distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.15/apache-maven-3.9.15-bin.zip' .mvn/wrapper/maven-wrapper.properties

      - name: Download Allure results
        uses: actions/download-artifact@v8
        with:
          pattern: allure-results-*
          path: target/allure-results
          merge-multiple: true

      - name: Validate downloaded Allure results
        shell: bash
        run: |
          if ! find target/allure-results -name '*-result.json' -print -quit | grep -q .; then
            echo "No Allure result files were downloaded; skipping Pages publication."
            exit 1
          fi

      - name: Restore Allure history cache
        uses: actions/cache@v5
        with:
          path: target/allure-history
          key: allure-history-${{ github.run_id }}
          restore-keys: |
            allure-history-

      - name: Attach previous Allure history
        shell: bash
        run: |
          if [[ -d target/allure-history/history ]]; then
            mkdir -p target/allure-results/history
            cp -R target/allure-history/history/. target/allure-results/history/
          fi

      - name: Generate Allure report
        run: ./mvnw allure:report -DskipTests -Dallure.issue.pattern=https://github.com/${{ github.repository }}/issues/{}

      - name: Preserve Allure history
        shell: bash
        run: |
          rm -rf target/allure-history
          mkdir -p target/allure-history
          if [[ -d target/allure-report/history ]]; then
            cp -R target/allure-report/history target/allure-history/history
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify-scheduled-failure:
    needs: [test, accessibility, publish-allure-report]
    if: always() && github.event_name == 'schedule' && (needs.test.result == 'failure' || needs.accessibility.result == 'failure' || needs.publish-allure-report.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    env:
      TEST_RESULT: ${{ needs.test.result }}
      ACCESSIBILITY_RESULT: ${{ needs.accessibility.result }}
      PUBLISH_RESULT: ${{ needs.publish-allure-report.result }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ISSUE_TITLE: Scheduled UI regression failure
    steps:
      - name: Open or update scheduled failure issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const body = [
              'A scheduled UI regression run failed.',
              '',
              `- Workflow run: ${process.env.RUN_URL}`,
              `- Test job result: ${process.env.TEST_RESULT}`,
              `- Accessibility job result: ${process.env.ACCESSIBILITY_RESULT}`,
              `- Publish job result: ${process.env.PUBLISH_RESULT}`,
              `- Commit: ${context.sha}`,
              `- Triggered at: ${new Date().toISOString()}`,
            ].join('\n');

            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scheduled-failure',
              per_page: 100,
            });

            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.notice(`Updated existing scheduled failure issue #${existing.number}`);
              return;
            }

            const {data: issue} = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'scheduled-failure'],
            });
            core.notice(`Created scheduled failure issue #${issue.number}`);
