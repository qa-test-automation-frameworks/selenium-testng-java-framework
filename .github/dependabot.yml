version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    groups:
      selenium:
        patterns:
          - "org.seleniumhq.selenium:*"
      allure:
        patterns:
          - "io.qameta.allure:*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
